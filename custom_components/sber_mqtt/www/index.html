<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sber MQTT Bridge</title>
<link rel="stylesheet" href="/local/sber_mqtt/panel.css">
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <h1>Sber MQTT Bridge</h1>
  </div>
  <div class="conn-badge">
    <div class="dot" id="dot"></div>
    <span id="connText">…</span>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="toolbar">
    <div class="toolbar-l" id="cntLabel">Загрузка…</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="doExport()" title="Скачать все устройства как JSON-файл">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-14 9v2h14v-2H5z"/></svg>
        Экспорт
      </button>
      <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()" title="Загрузить устройства из JSON-файла">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 15h4v6h6v-6h4l-7-7-7 7zm0-10v2h14V5H5z"/></svg>
        Импорт
      </button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="doImport(this)">
      <button class="btn btn-ghost" onclick="doPublishConfig()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Обновить в Сбере
      </button>
      <button class="btn btn-ghost" onclick="doPublishStatus()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M2 12l10 10 10-10h-6V2H8v10H2z"/></svg>
        Отправить состояния
      </button>
      <button class="btn btn-ghost" id="btnDevTools" style="display:none" onclick="window.location.href='/api/sber_mqtt/devtools'" title="Инструменты разработчика">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        Dev Tools
      </button>
      <button class="btn btn-primary" onclick="openWizard()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Добавить устройство
      </button>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('name')">Имя <span id="si-name"></span></th>
        <th onclick="sortBy('room')">Комната <span id="si-room"></span></th>
        <th onclick="sortBy('device_type')">Тип <span id="si-device_type"></span></th>
        <th>Атрибуты</th>
        <th>Последнее состояние</th>
        <th class="del-col"></th>
      </tr></thead>
      <tbody id="tbody">
        <tr><td colspan="6"><div class="loading"><div class="spin" style="border-color:#ddd3;border-top-color:var(--primary)"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ADD WIZARD -->
<div id="wiz" class="overlay" style="display:none">
  <div class="modal">
    <div class="m-hdr">
      <h2 id="wizTitle">Добавить устройство</h2>
      <button class="m-close" onclick="closeWizard()">✕</button>
    </div>
    <div class="m-body">
      <div class="steps" id="wizSteps"></div>
      <div id="wizContent"></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" id="btnBack" onclick="wizBack()" style="display:none">← Назад</button>
      <button class="btn btn-primary" id="btnNext" onclick="wizNext()">Далее →</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div id="conf" class="overlay" style="display:none">
  <div class="conf-box">
    <h3>Удалить устройство?</h3>
    <p id="confTxt"></p>
    <div class="ca">
      <button class="btn btn-ghost" onclick="closeConf()">Отмена</button>
      <button class="btn btn-danger" onclick="doDelete()">Удалить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── HA Theme Sync ─────────────────────────────────────────────────────────
// Читаем тему из родительского окна HA (тот же домен, CORS не мешает).
// Определяем тёмный/светлый режим по яркости --primary-background-color.
function syncHATheme() {
  try {
    const ps = window.parent.getComputedStyle(window.parent.document.documentElement);
    const bgColor = ps.getPropertyValue('--primary-background-color').trim()
                 || ps.getPropertyValue('--lovelace-background').trim();
    const isDark = (() => {
      if (!bgColor) return false;
      const tmp = document.createElement('div');
      tmp.style.color = bgColor;
      document.body.appendChild(tmp);
      const rgb = window.getComputedStyle(tmp).color;
      document.body.removeChild(tmp);
      const m = rgb.match(/\d+/g);
      if (!m) return false;
      const [r, g, b] = m.map(Number);
      return (0.299 * r + 0.587 * g + 0.114 * b) < 128;
    })();
    document.documentElement.classList.toggle('ha-dark', isDark);
  } catch (e) { /* открыт не в iframe — оставляем светлую тему */ }
}
function watchHATheme() {
  try {
    new MutationObserver(syncHATheme).observe(
      window.parent.document.documentElement,
      { attributes: true, attributeFilter: ['style', 'class'] }
    );
  } catch (e) { }
}
syncHATheme();
watchHATheme();
</script>
<script src="/local/sber_mqtt/panel.js"></script>
</body>
</html>
