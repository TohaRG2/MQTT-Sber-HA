<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sber MQTT Bridge</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--border:#e1e4e8;--primary:#21a038;--primary-dk:#157a2a;--primary-lt:#e8f5e9;--danger:#d32f2f;--text:#1a1a2e;--muted:#6b7280;--radius:10px;--shadow:0 2px 8px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo svg{width:18px;height:18px;fill:#fff}
.hdr h1{font-size:16px;font-weight:600}
.conn-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);background:var(--bg);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.dot{width:7px;height:7px;border-radius:50%;background:#9e9e9e;transition:background .3s}
.dot.ok{background:var(--primary)}.dot.err{background:var(--danger)}
.main{max-width:1400px;margin:0 auto;padding:20px 16px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.toolbar-l{font-size:14px;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;line-height:1.4}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dk)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b71c1c}
.btn-sm{padding:4px 10px;font-size:12px}.btn:disabled{opacity:.5;cursor:not-allowed}
.tbl-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:var(--bg);padding:9px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;text-align:left;overflow:hidden;text-overflow:ellipsis}
th:hover{color:var(--primary)}th.sorted{color:var(--primary)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top;overflow:hidden}
th:nth-child(1),td:nth-child(1){width:14%}
th:nth-child(2),td:nth-child(2){width:14%}
th:nth-child(3),td:nth-child(3){width:9%}
th:nth-child(4),td:nth-child(4){width:12%}
th:nth-child(5),td:nth-child(5){width:28%}
th:nth-child(6),td:nth-child(6){width:18%}
th:nth-child(7),td:nth-child(7){width:5%;text-align:center}
tr:last-child td{border-bottom:none}tr:hover td{background:#fafafa}
.id-cell{font-family:monospace;font-size:11px;color:var(--muted)}
.type-badge{display:inline-flex;align-items:center;gap:3px;background:var(--primary-lt);color:var(--primary-dk);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.attrs{font-size:11px;color:var(--muted);line-height:1.7;word-break:break-all}
.state-cell{font-size:10px;font-family:monospace;background:#f6f8fa;border:1px solid var(--border);border-radius:4px;padding:3px 6px;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;display:inline-block}
.state-cell:hover{white-space:normal;word-break:break-all;max-width:none}
.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:14px}.empty h3{font-size:17px;margin-bottom:6px;color:var(--text)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:660px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.m-hdr{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.m-hdr h2{font-size:17px;font-weight:600}
.m-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);padding:4px;border-radius:6px;line-height:1}.m-close:hover{background:var(--bg)}
.m-body{padding:18px 20px;overflow-y:auto;flex:1}.m-foot{padding:14px 20px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.steps{display:flex;margin-bottom:22px}
.step{flex:1;text-align:center;position:relative}
.step::after{content:'';position:absolute;top:13px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0}
.step:last-child::after{display:none}
.step-c{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);position:relative;z-index:1;margin-bottom:4px;transition:all .2s}
.step.active .step-c{border-color:var(--primary);background:var(--primary);color:#fff}
.step.done .step-c{border-color:var(--primary);background:var(--primary-lt);color:var(--primary)}
.step.done::after{background:var(--primary)}.step-lbl{font-size:10px;color:var(--muted)}
.step.active .step-lbl{color:var(--primary);font-weight:500}
.fg{margin-bottom:16px}.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--text)}.fg .hint{font-size:11px;color:var(--muted);margin-top:3px}
input[type=text],select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);background:var(--card);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(33,160,56,.12)}
.type-card{border:2px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .15s}
.type-card:hover,.type-card.sel{border-color:var(--primary);background:var(--primary-lt)}
.type-icon{font-size:26px;line-height:1;flex-shrink:0}.type-name{font-weight:600;font-size:14px;margin-bottom:3px}.type-desc{font-size:12px;color:var(--muted)}
.picker{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.psearch{display:flex;align-items:center;gap:7px;padding:7px 11px;border-bottom:1px solid var(--border);background:var(--bg)}
.psearch input{border:none;background:none;flex:1;padding:3px 0;font-size:13px;outline:none}
.psearch .clr{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px 3px}
.p-head{display:grid;grid-template-columns:90px 110px 1fr 150px;gap:6px;padding:5px 11px;background:var(--bg);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.p-list{max-height:260px;overflow-y:auto}
.p-item{display:grid;grid-template-columns:90px 110px 1fr 150px;gap:6px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--border);align-items:center;transition:background .1s}
.p-item:last-child{border-bottom:none}.p-item:hover,.p-item.sel{background:var(--primary-lt)}
.dom-badge{background:#e3f2fd;color:#1565c0;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;text-align:center;white-space:nowrap}
.p-area{font-size:11px;color:var(--muted)}.p-name{font-size:12px;font-weight:500}
.p-eid{font-size:10px;font-family:monospace;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sf label{font-size:12px;font-weight:600;margin-bottom:5px;display:block}
.sf-btn{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--card);text-align:left;cursor:pointer;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
.sf-btn.filled{color:var(--text);border-color:var(--primary);background:var(--primary-lt)}.sf-btn:hover{border-color:var(--primary)}
.sf-clr{border:none;background:none;cursor:pointer;color:var(--danger);font-size:11px;margin-left:6px}.sf-sub{font-size:10px;color:var(--muted);margin-top:3px}
.sp-wrap{margin-top:14px}
.conf-box{background:#fff;border-radius:12px;padding:22px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.conf-box h3{margin-bottom:8px;font-size:16px}.conf-box p{font-size:13px;color:var(--muted);margin-bottom:18px}
.conf-box .ca{display:flex;justify-content:flex-end;gap:8px}
.toast{position:fixed;bottom:20px;right:20px;background:#323232;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;transform:translateY(70px);opacity:0;transition:all .28s;pointer-events:none;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}.toast.ok{background:var(--primary)}.toast.err{background:var(--danger)}
.spin{width:16px;height:16px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:40px}

</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <h1>Sber MQTT Bridge</h1>
  </div>
  <div class="conn-badge">
    <div class="dot" id="dot"></div>
    <span id="connText">…</span>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="toolbar">
    <div class="toolbar-l" id="cntLabel">Загрузка…</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="doPublishConfig()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Обновить в Сбере
      </button>
      <button class="btn btn-ghost" onclick="doPublishStatus()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M2 12l10 10 10-10h-6V2H8v10H2z"/></svg>
        Отправить состояния
      </button>
      <button class="btn btn-primary" onclick="openWizard()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Добавить устройство
      </button>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('name')">Имя <span id="si-name"></span></th>
        <th onclick="sortBy('id')">ID <span id="si-id"></span></th>
        <th onclick="sortBy('room')">Комната <span id="si-room"></span></th>
        <th onclick="sortBy('device_type')">Тип <span id="si-device_type"></span></th>
        <th>Атрибуты</th>
        <th>Последнее состояние</th>
        <th class="del-col"></th>
      </tr></thead>
      <tbody id="tbody">
        <tr><td colspan="7"><div class="loading"><div class="spin" style="border-color:#ddd3;border-top-color:var(--primary)"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>


<!-- ADD WIZARD -->
<div id="wiz" class="overlay" style="display:none">
  <div class="modal">
    <div class="m-hdr">
      <h2 id="wizTitle">Добавить устройство</h2>
      <button class="m-close" onclick="closeWizard()">✕</button>
    </div>
    <div class="m-body">
      <div class="steps" id="wizSteps"></div>
      <div id="wizContent"></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" id="btnBack" onclick="wizBack()" style="display:none">← Назад</button>
      <button class="btn btn-primary" id="btnNext" onclick="wizNext()">Далее →</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div id="conf" class="overlay" style="display:none">
  <div class="conf-box">
    <h3>Удалить устройство?</h3>
    <p id="confTxt"></p>
    <div class="ca">
      <button class="btn btn-ghost" onclick="closeConf()">Отмена</button>
      <button class="btn btn-danger" onclick="doDelete()">Удалить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── API ──────────────────────────────────────────────────────────
// Токен вшит в страницу сервером (window.HA_ACCESS_TOKEN).
// Используется для Bearer авторизации API запросов.
let _token = window.HA_ACCESS_TOKEN || null;

async function api(url, opts={}) {
  const headers = { 'Content-Type': 'application/json' };
  if (_token) headers['Authorization'] = 'Bearer ' + _token;
  const r = await fetch(url, { headers, ...opts });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error || `HTTP ${r.status}`);
  }
  return r.json();
}

// ================================================================
const TYPE_LABELS = { relay:'Реле', sensor_temp:'Датчик температуры/влажности', scenario_button:'Сценарная кнопка', hvac_ac:'Кондиционер', vacuum_cleaner:'Пылесос', valve:'Кран', light:'Лампа' };
const STEPS = {
  relay:           ['Тип устройства','Источник в HA','Параметры'],
  sensor_temp:     ['Тип устройства','Датчики в HA','Параметры'],
  scenario_button: ['Тип устройства','Источник в HA','Параметры'],
  hvac_ac:         ['Тип устройства','Источник в HA','Параметры'],
  vacuum_cleaner:  ['Тип устройства','Источник в HA','Параметры'],
  valve:           ['Тип устройства','Источник в HA','Параметры'],
  light:           ['Тип устройства','Источник в HA','Параметры'],
};

let devices=[], sortField='name', sortAsc=true, delId=null;
let wStep=1, wType=null, wData={}, haRelay=[], haSensors=[], sFilter='', spField=null;

async function loadStatus() {
  try {
    const d = await api('/api/sber_mqtt/status');
    document.getElementById('dot').className='dot '+(d.connected?'ok':'err');
    document.getElementById('connText').textContent=d.connected?`${d.login} · ${d.broker}`:'Нет подключения';
  } catch(e) {
    document.getElementById('connText').textContent='Ошибка';
  }
}

async function loadDevices() {
  try {
    const d = await api('/api/sber_mqtt/devices');
    devices=d.devices||[];
    renderTable();
    document.getElementById('cntLabel').textContent=`Устройств: ${devices.length}`;
  } catch(e) {
    document.getElementById('tbody').innerHTML=
      `<tr><td colspan="7" style="color:var(--danger);text-align:center;padding:20px">Ошибка: ${esc(e.message)}</td></tr>`;
  }
}

function fmtState(s) {
  if (!s || !Object.keys(s).length) return '—';
  // Красиво форматируем states: [{"key":"on_off","value":{"bool_value":true}}]
  // → on_off: true, online: true
  if (Array.isArray(s.states)) {
    return s.states.map(item => {
      const v = item.value || {};
      const val = v.bool_value !== undefined ? v.bool_value
                : v.integer_value !== undefined ? v.integer_value
                : v.enum_value !== undefined ? v.enum_value
                : JSON.stringify(v);
      return `${item.key}: ${val}`;
    }).join(' | ');
  }
  return JSON.stringify(s);
}

function renderTable() {
  const rows=[...devices].sort((a,b)=>{
    const va=(a[sortField]||'').toString().toLowerCase();
    const vb=(b[sortField]||'').toString().toLowerCase();
    return sortAsc?va.localeCompare(vb,'ru'):vb.localeCompare(va,'ru');
  });
  ['name','id','room','device_type'].forEach(f=>{
    const el=document.getElementById(`si-${f}`);
    if(el){el.textContent=sortField===f?(sortAsc?'▲':'▼'):'';el.closest('th').classList.toggle('sorted',sortField===f);}
  });
  const tb=document.getElementById('tbody');
  if(!rows.length){
    tb.innerHTML=`<tr><td colspan="7"><div class="empty"><div class="ei">🏠</div><h3>Нет устройств</h3><p>Нажмите «Добавить устройство»</p></div></td></tr>`;
    return;
  }
  tb.innerHTML=rows.map(d=>{
    const attrs=Object.entries(d.attributes||{}).map(([k,v])=>`<div><b>${esc(k)}:</b> ${esc(v||'—')}</div>`).join('');
    return `<tr>
      <td><b>${esc(d.name)}</b></td>
      <td class="id-cell">${esc(d.id)}</td>
      <td>${esc(d.room||'—')}</td>
      <td><span class="type-badge">${esc(TYPE_LABELS[d.device_type]||d.device_type)}</span></td>
      <td class="attrs">${attrs||'—'}</td>
      <td class="state-col"><span class="state-cell" title="${fmtState(d.last_state)}">${esc(fmtState(d.last_state))}</span></td>
      <td class="del-col"><button class="btn btn-ghost btn-sm" onclick="askDel('${esc(d.id)}','${esc(d.name)}')">🗑</button></td>
    </tr>`;
  }).join('');
}

function sortBy(f){if(sortField===f)sortAsc=!sortAsc;else{sortField=f;sortAsc=true;}renderTable();}

async function doPublishConfig(){
  try{const r=await api('/api/sber_mqtt/publish_config',{method:'POST'});toast(`Конфигурация (${r.devices_count} устройств) отправлена`,'ok');}
  catch(e){toast('Ошибка: '+e.message,'err');}
}

async function doPublishStatus(){
  try{
    const r=await api('/api/sber_mqtt/publish_status',{method:'POST'});
    if(r.ok){
      // Обновляем last_state в локальном массиве и перерисовываем таблицу
      for(const [device_id, last] of Object.entries(r.states||{})){
        const d=devices.find(x=>x.id===device_id);
        if(d) d.last_state=last;
      }
      renderTable();
      toast(`Состояния (${Object.keys(r.states||{}).length} устройств) отправлены`,'ok');
    }
  } catch(e){toast('Ошибка: '+e.message,'err');}
}

function askDel(id,name){delId=id;document.getElementById('confTxt').textContent=`Устройство «${name}» будет удалено.`;document.getElementById('conf').style.display='flex';}
function closeConf(){delId=null;document.getElementById('conf').style.display='none';}
async function doDelete(){
  if(!delId)return;const id=delId;closeConf();
  try{await api(`/api/sber_mqtt/devices/${id}`,{method:'DELETE'});toast('Удалено','ok');await loadDevices();}
  catch(e){toast('Ошибка: '+e.message,'err');}
}

function openWizard(){
  // Состояние уже сброшено в closeWizard(), просто показываем и рендерим
  document.getElementById('wiz').style.display='flex';
  renderWiz();
}
function closeWizard(){
  document.getElementById('wiz').style.display='none';
  // Полный сброс состояния чтобы следующее открытие начиналось чисто
  wStep=1;wType=null;wData={};sFilter='';spField=null;haRelay=[];haSensors=[];haClimate=[];haVacuum=[];haValve=[];haLight=[];
  const btn=document.getElementById('btnNext');
  if(btn){btn.disabled=false;btn.textContent='Далее →';}
}

async function wizNext(){
  if(!await wizValidate())return;
  const total=(STEPS[wType]||['','','']).length;
  if(wStep<total){
    wStep++;
    // Загружаем список сущностей при переходе на шаг 2 (если ещё не загружены)
    if(wStep===2){if(wType==='relay')await fetchRelay();if(wType==='sensor_temp')await fetchSensors();if(wType==='scenario_button')await fetchRelay();if(wType==='hvac_ac')await Promise.all([fetchClimate(),fetchSensors()]);if(wType==='vacuum_cleaner')await Promise.all([fetchVacuum(),fetchSensors()]);if(wType==='valve')await fetchValve();if(wType==='light')await fetchLight();}
    renderWiz();
  }else{
    await submitDevice();
  }
}
function wizBack(){if(wStep>1){wStep--;renderWiz();}}

async function wizValidate(){
  const total=(STEPS[wType]||['','','']).length;
  const isLast=wStep===total;

  if(wStep===1){
    // Шаг 1: выбор типа
    if(!wType){toast('Выберите тип','err');return false;}
  } else if(wStep===2&&!isLast){
    // Шаг 2 — выбор сущности (только если не последний шаг)
    if(wType==='relay'&&!wData.entity_id){toast('Выберите сущность','err');return false;}
    if(wType==='scenario_button'&&!wData.entity_id){toast('Выберите сущность','err');return false;}
    if(wType==='hvac_ac'&&!wData.entity_id){toast('Выберите климатическую сущность','err');return false;}
    if(wType==='vacuum_cleaner'&&!wData.entity_id){toast('Выберите пылесос','err');return false;}
    if(wType==='valve'&&!wData.entity_id){toast('Выберите сущность крана','err');return false;}
    if(wType==='light'&&!wData.entity_id){toast('Выберите лампу','err');return false;}
    if(wType==='sensor_temp'&&!wData.temperature_entity&&!wData.humidity_entity){toast('Выберите температуру или влажность','err');return false;}
  }

  if(isLast){
    // Последний шаг — параметры устройства
    const name=document.getElementById('dName')?.value?.trim();
    const id=document.getElementById('dId')?.value?.trim();
    if(!name){toast('Введите имя','err');return false;}
    // Валидация имени по требованиям Салюта: только русские буквы, цифры и пробелы, 3–33 символа
    if(!/^[а-яёА-ЯЁ0-9 ]{3,33}$/.test(name)){
      toast('Имя: только русские буквы, цифры и пробелы, от 3 до 33 символов','err');
      return false;
    }
    if(!id){toast('Введите ID','err');return false;}
    if(!/^[a-z0-9_]+$/.test(id)){toast('ID: только a-z, 0-9 и _','err');return false;}
    if(devices.find(d=>d.id===id)){toast(`ID «${id}» уже занят`,'err');return false;}
    wData.name=name;wData.id=id;wData.room=document.getElementById('dRoom')?.value?.trim()||'';
  }
  return true;
}

function renderWiz(){
  const steps=STEPS[wType]||['Тип','Выбор','Параметры'];
  document.getElementById('wizTitle').textContent=steps[wStep-1];
  document.getElementById('btnBack').style.display=wStep>1?'':'none';
  document.getElementById('btnNext').textContent=wStep===steps.length?'Готово ✓':'Далее →';
  document.getElementById('wizSteps').innerHTML=steps.map((lbl,i)=>{
    const n=i+1,cls=n<wStep?'done':n===wStep?'active':'';
    return `<div class="step ${cls}"><div class="step-c">${n<wStep?'✓':n}</div><div class="step-lbl">${lbl}</div></div>`;
  }).join('');
  const c=document.getElementById('wizContent');
  if(wStep===1)c.innerHTML=renderStep1();

}

async function submitDevice(){
  const attrs={};
  if(wType==='relay'){attrs.entity_id=wData.entity_id;attrs.entity_name=wData.entity_name||'';}
  else if(wType==='scenario_button'){attrs.entity_id=wData.entity_id;attrs.entity_name=wData.entity_name||'';}
  else if(wType==='hvac_ac'){
    attrs.entity_id=wData.entity_id;attrs.entity_name=wData.entity_name||'';
    if(wData.temperature_entity)attrs.temperature_entity=wData.temperature_entity;
  }
  else if(wType==='vacuum_cleaner'){
    attrs.entity_id=wData.entity_id;attrs.entity_name=wData.entity_name||'';
    if(wData.battery_entity)attrs.battery_entity=wData.battery_entity;
  }
  else if(wType==='valve'){
    attrs.entity_id=wData.entity_id;attrs.entity_name=wData.entity_name||'';
  }
  else if(wType==='light'){
    attrs.entity_id=wData.entity_id;attrs.entity_name=wData.entity_name||'';
    // Сохраняем выбранные фичи как булевые флаги
    for(const f of ['light_brightness','light_colour','light_colour_temp','light_mode']){
      attrs[f]=!!(wData.light_features&&wData.light_features.includes(f));
    }
  }
  else{['temperature_entity','humidity_entity','battery_entity','signal_entity'].forEach(k=>{if(wData[k])attrs[k]=wData[k];});}
  const body={id:wData.id,name:wData.name,room:wData.room||'',device_type:wType,attributes:attrs};
  const btn=document.getElementById('btnNext');btn.disabled=true;btn.innerHTML='<div class="spin"></div>';
  try{
    const res = await api('/api/sber_mqtt/devices',{method:'POST',body:JSON.stringify(body)});
    closeWizard();
    toast('Устройство добавлено','ok');
    await loadDevices();
    // Применяем last_state из ответа — он уже содержит начальное состояние
    if(res.device?.last_state && Object.keys(res.device.last_state).length){
      const d=devices.find(x=>x.id===res.device.id);
      if(d){d.last_state=res.device.last_state;renderTable();}
    }
  }
  catch(e){toast('Ошибка: '+e.message,'err');btn.disabled=false;btn.textContent='Готово ✓';}
}

    <div style="margin-top:18px">
      <div class="sf"><label>🔋 Датчик заряда батареи <span style="color:var(--muted);font-weight:400">(опционально)</span></label>
        <button class="sf-btn ${batSel?'filled':''}" onclick="openVacBatteryPicker()">
          <span>${batSel?(batEntity?.friendly_name||batSel):'Выбрать сенсор…'}</span><span>${batSel?'✓':'▾'}</span>
        </button>
        ${batSel?`<div class="sf-sub">${esc(batSel)} <button class="sf-clr" onclick="clearVacBattery()">✕</button></div>`:''}
        <div class="hint">Автоматически подтянется датчик батареи того же устройства. Если не задан — используется атрибут battery_level пылесоса.</div>
      </div>
    </div>
    <div id="vacBatteryPicker" style="display:none;margin-top:10px">
      <div class="picker">
        <div class="psearch"><span style="color:var(--muted)">🔍</span>
          <input id="vacBatInput" type="text" placeholder="Поиск…" oninput="renderVacBatList(this.value)"/>
          <button class="clr" onclick="vacBatInput.value='';renderVacBatList('')">✕</button>
        </div>
        <div class="p-head"><div>Класс</div><div>Комната</div><div>Имя</div><div>Entity ID</div></div>
        <div class="p-list" id="vacBatList"></div>
      </div>
    </div>`;
}

function vacItems(){
  const list=haVacuum.filter(e=>!sFilter||(e.area+e.entity_id+e.friendly_name).toLowerCase().includes(sFilter.toLowerCase()));
  if(!list.length)return`<div class="p-empty">Нет пылесосов</div>`;
  return list.map(e=>`<div class="p-item ${wData.entity_id===e.entity_id?'sel':''}" onclick="pickVacEntity('${esc(e.entity_id)}','${esc(e.friendly_name)}','${esc(e.area)}','${esc(e.device_id||'')}')">
    <span class="dom-badge">vacuum</span><span class="p-area">${esc(e.area||'—')}</span>
    <span class="p-name">${esc(e.friendly_name)}</span><span class="p-eid">${esc(e.entity_id)}</span></div>`).join('');
}

function pickVacEntity(eid, name, area, deviceId){
  wData.entity_id=eid; wData.entity_name=name; wData.entity_area=area;
  // Автоматически ищем датчик батареи того же устройства HA
  if(deviceId){
    const batSensor=haSensors.find(s=>s.device_class==='battery' && s.device_id===deviceId);
    if(batSensor){
      wData.battery_entity=batSensor.entity_id;
      wData.battery_entity_name=batSensor.friendly_name;
    }
  }
  document.getElementById('wizContent').innerHTML=renderStep2Vacuum();
}

function openVacBatteryPicker(){
  const el=document.getElementById('vacBatteryPicker');
  el.style.display='';
  document.getElementById('vacBatInput').value='';
  renderVacBatList('');
  el.scrollIntoView({behavior:'smooth'});
}
function renderVacBatList(q){
  q=(q||'').toLowerCase();
  let list=haSensors.filter(s=>s.device_class==='battery');
  if(q)list=list.filter(s=>(s.area+s.entity_id+s.friendly_name).toLowerCase().includes(q));
  const el=document.getElementById('vacBatList'); if(!el)return;
  el.innerHTML=list.length?list.map(s=>`<div class="p-item ${wData.battery_entity===s.entity_id?'sel':''}" onclick="pickVacBattery('${esc(s.entity_id)}','${esc(s.friendly_name)}')">
    <span class="dom-badge">${esc(s.device_class)}</span><span class="p-area">${esc(s.area||'—')}</span>
    <span class="p-name">${esc(s.friendly_name)}</span><span class="p-eid">${esc(s.entity_id)}</span></div>`).join(''):`<div class="p-empty">Нет датчиков батареи</div>`;
}
function pickVacBattery(eid,name){wData.battery_entity=eid;wData.battery_entity_name=name;document.getElementById('wizContent').innerHTML=renderStep2Vacuum();}
function clearVacBattery(){delete wData.battery_entity;delete wData.battery_entity_name;document.getElementById('wizContent').innerHTML=renderStep2Vacuum();}

// ── Кран ──────────────────────────────────────────────────────────────────
let haValve=[];
async function fetchValve(){
  if(haValve.length)return;
  try{haValve=(await api('/api/sber_mqtt/ha_entities/valve')).entities||[];}
  catch(e){toast('Ошибка загрузки кранов','err');}
}

function renderStep2Valve(){
  const sel=wData.entity_id;
  const list=haValve.filter(e=>!sFilter||(e.area+e.domain+e.entity_id+e.friendly_name).toLowerCase().includes(sFilter.toLowerCase()));
  return `<div class="fg" style="margin-bottom:10px"><label>Выберите сущность крана (valve или switch):</label>
    <div style="font-size:11px;color:var(--muted);margin-top:3px">valve: поддерживает open/close/stop · switch: поддерживает open/close</div></div>
    <div class="picker">
      <div class="psearch"><span style="color:var(--muted)">🔍</span>
        <input type="text" placeholder="Поиск…" value="${esc(sFilter)}"
          oninput="sFilter=this.value;document.getElementById('valvelist').innerHTML=valveItems()"/>
        <button class="clr" onclick="sFilter='';document.getElementById('valvelist').innerHTML=valveItems()">✕</button>
      </div>
      <div class="p-head"><div>Домен</div><div>Комната</div><div>Имя</div><div>Entity ID</div></div>
      <div class="p-list" id="valvelist">${valveItems()}</div>
    </div>
    ${sel?`<div style="margin-top:10px;padding:8px 12px;background:var(--primary-lt);border-radius:7px;font-size:12px;color:var(--primary-dk)">✓ Выбрано: <b>${esc(sel)}</b></div>`:''}`;
}
function valveItems(){
  const list=haValve.filter(e=>!sFilter||(e.area+e.domain+e.entity_id+e.friendly_name).toLowerCase().includes(sFilter.toLowerCase()));
  if(!list.length)return`<div class="p-empty">Нет подходящих сущностей</div>`;
  return list.map(e=>`<div class="p-item ${wData.entity_id===e.entity_id?'sel':''}" onclick="pickValveEntity('${esc(e.entity_id)}','${esc(e.friendly_name)}','${esc(e.area)}')">
    <span class="dom-badge">${esc(e.domain)}</span><span class="p-area">${esc(e.area||'—')}</span>
    <span class="p-name">${esc(e.friendly_name)}</span><span class="p-eid">${esc(e.entity_id)}</span></div>`).join('');
}
function pickValveEntity(eid,name,area){wData.entity_id=eid;wData.entity_name=name;wData.entity_area=area;document.getElementById('wizContent').innerHTML=renderStep2Valve();}

// ── Лампа ──────────────────────────────────────────────────────────────────
let haLight=[];
async function fetchLight(){
  if(haLight.length)return;
  try{haLight=(await api('/api/sber_mqtt/ha_entities/light')).entities||[];}
  catch(e){toast('Ошибка загрузки ламп','err');}
}

// Человекочитаемые названия фич
const LIGHT_FEATURE_LABELS = {
  light_brightness:   '🔆 Яркость',
  light_colour:       '🎨 Цвет',
  light_colour_temp:  '🌡 Цветовая температура',
  light_mode:         '🔀 Режим (белый / цветной)',
};

function renderStep2Light(){
  const sel = wData.entity_id;
  const selEntity = haLight.find(e=>e.entity_id===sel);
  // Автозаполняем фичи при первом выборе лампы
  if(!wData.light_features && selEntity){
    wData.light_features = [...(selEntity.supported_features||[])];
  }
  const list = haLight.filter(e=>!sFilter||(e.area+e.entity_id+e.friendly_name).toLowerCase().includes(sFilter.toLowerCase()));
  return `<div class="fg" style="margin-bottom:10px"><label>Выберите лампу (light):</label></div>
    <div class="picker">
      <div class="psearch"><span style="color:var(--muted)">🔍</span>
        <input type="text" placeholder="Поиск…" value="${esc(sFilter)}"
          oninput="sFilter=this.value;document.getElementById('lightlist').innerHTML=lightItems()"/>
        <button class="clr" onclick="sFilter='';document.getElementById('lightlist').innerHTML=lightItems()">✕</button>
      </div>
      <div class="p-head"><div>Домен</div><div>Комната</div><div>Имя</div><div>Entity ID</div></div>
      <div class="p-list" id="lightlist">${lightItems()}</div>
    </div>
    ${sel?`<div style="margin-top:10px;padding:8px 12px;background:var(--primary-lt);border-radius:7px;font-size:12px;color:var(--primary-dk)">✓ Выбрано: <b>${esc(sel)}</b></div>`:''}
    ${sel?renderLightFeatures(selEntity):''}`;
}

function lightItems(){
  const list=haLight.filter(e=>!sFilter||(e.area+e.entity_id+e.friendly_name).toLowerCase().includes(sFilter.toLowerCase()));
  if(!list.length)return`<div class="p-empty">Нет ламп</div>`;
  return list.map(e=>`<div class="p-item ${wData.entity_id===e.entity_id?'sel':''}" onclick="pickLightEntity('${esc(e.entity_id)}','${esc(e.friendly_name)}','${esc(e.area)}')">
    <span class="dom-badge">light</span><span class="p-area">${esc(e.area||'—')}</span>
    <span class="p-name">${esc(e.friendly_name)}</span><span class="p-eid">${esc(e.entity_id)}</span></div>`).join('');
}

function renderLightFeatures(entity){
  const allFeats = ['light_brightness','light_colour','light_colour_temp','light_mode'];
  const supported = entity?new Set(entity.supported_features||[]):new Set();
  const selected  = new Set(wData.light_features||[]);
  return `<div style="margin-top:18px">
    <div class="fg"><label>Функции в Салюте:</label>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">Отмечены функции, поддерживаемые лампой. Снимите галочку, чтобы отключить.</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">
      ${allFeats.map(f=>{
        const isSupported = supported.has(f);
        const isChecked   = selected.has(f);
        return `<label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:${isChecked?'var(--primary-lt)':'#fff'};opacity:${isSupported?1:0.5}">
          <input type="checkbox" ${isChecked?'checked':''} ${!isSupported?'disabled':''} onchange="toggleLightFeature('${f}',this.checked)" style="width:16px;height:16px;accent-color:var(--primary)">
          <span style="font-size:13px">${LIGHT_FEATURE_LABELS[f]||f}</span>
          ${!isSupported?'<span style="font-size:10px;color:var(--muted);margin-left:auto">не поддерживается лампой</span>':''}
        </label>`;
      }).join('')}
    </div>
  </div>`;
}

function pickLightEntity(eid,name,area){
  wData.entity_id=eid;wData.entity_name=name;wData.entity_area=area;
  // Автоматически выбираем поддерживаемые фичи
  const entity=haLight.find(e=>e.entity_id===eid);
  wData.light_features=entity?[...(entity.supported_features||[])]:[];
  document.getElementById('wizContent').innerHTML=renderStep2Light();
}
function toggleLightFeature(feat,checked){
  if(!wData.light_features)wData.light_features=[];
  if(checked){if(!wData.light_features.includes(feat))wData.light_features.push(feat);}
  else{wData.light_features=wData.light_features.filter(f=>f!==feat);}
  // Перерисовываем только блок фич без пересоздания всего шага
  const entity=haLight.find(e=>e.entity_id===wData.entity_id);
  const block=document.querySelector('#wizContent > div:last-child');
  if(block&&wData.entity_id){block.outerHTML=renderLightFeatures(entity);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function slugify(t){const m={а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'yo',ж:'zh',з:'z',и:'i',й:'j',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'ts',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya',' ':'_'};return t.toLowerCase().split('').map(c=>m[c]!==undefined?m[c]:(/[a-z0-9]/.test(c)?c:'_')).join('').replace(/_+/g,'_').replace(/^_|_$/g,'')||'device';}
let toastT=null;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+type+' show';clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3200);}

async function init(){
  await Promise.all([loadStatus(),loadDevices()]);
  setInterval(loadStatus,30000);
}

window.addEventListener('load', init);
</script>
</body>
</html>
