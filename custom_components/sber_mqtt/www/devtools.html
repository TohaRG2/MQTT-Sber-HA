<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sber MQTT — Dev Tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.wrap {
  text-align: center;
  padding: 40px 24px;
  max-width: 460px;
}
.icon {
  font-size: 72px;
  line-height: 1;
  margin-bottom: 24px;
  display: block;
  filter: grayscale(0.3);
}
h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 12px;
  color: #e6edf3;
}
p {
  font-size: 14px;
  color: #8b949e;
  line-height: 1.7;
  margin-bottom: 20px;
}
.hint {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 14px 18px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 12px;
  color: #58a6ff;
  text-align: left;
  line-height: 1.9;
}
.hint span { color: #8b949e; }
a {
  display: inline-block;
  margin-top: 24px;
  color: #8b949e;
  font-size: 12px;
  text-decoration: none;
  border: 1px solid #30363d;
  padding: 6px 14px;
  border-radius: 6px;
  transition: all .15s;
}
a:hover { color: #e6edf3; border-color: #8b949e; }
</style>
</head>
<body>
<div class="wrap">
  <span class="icon">🔐</span>
  <h1>А вы точно разработчик?</h1>
  <p>
    Эта страница предназначена для отладки интеграции.<br>
    Стандартная сборка содержит только эту заглушку.
  </p>
  <a href="/api/sber_mqtt/panel">← Вернуться в панель</a>
</div>
</body>
</html>
